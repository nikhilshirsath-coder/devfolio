<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Devfolio</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <meta name="robots" content="noindex, follow" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c5cff'/%3E%3Cstop offset='1' stop-color='%2300d4ff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='22' fill='url(%23g)'/%3E%3Ctext x='50' y='68' font-family='Arial' font-weight='700' font-size='56' fill='white' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
  <div class="cursor-dot"></div><div class="cursor-ring"></div>

  <header class="navbar scrolled" id="navbar">
    <div class="container nav-container">
      <a href="index.html" class="nav-logo"><span class="nav-logo-icon">D</span><span>Devfolio</span></a>
      <a href="index.html" class="btn btn-primary btn-sm">← Back to Home</a>
    </div>
  </header>

  <main class="error-page">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>
    <div class="container" style="position: relative; z-index: 1;">
      <div class="error-code text-shimmer">404</div>
      <h1 style="font-size: var(--fs-2xl); margin-bottom: var(--space-md);">Looks like that page <span class="gradient-text">404'd</span>.</h1>
      <p style="font-size: var(--fs-md); color: var(--text-secondary); max-width: 520px; margin: 0 auto var(--space-xl);">The link you followed might be broken, or the page may have been moved. Let's get you back on track.</p>
      <div style="display:flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap;">
        <a href="index.html" class="btn btn-primary btn-lg btn-magnetic">← Take me home</a>
        <a href="contact.html" class="btn btn-secondary btn-lg">Report this issue</a>
      </div>
      <div style="margin-top: var(--space-3xl); font-family: var(--font-mono); font-size: var(--fs-xs); color: var(--text-muted); opacity: 0.6;">
        Error: ROUTE_NOT_FOUND · status: 404 · timestamp: <span id="current-datetime"></span>
      </div>
    </div>
  </main>

  <script src="js/theme.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
